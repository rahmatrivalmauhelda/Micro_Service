server:
  port: 9000
  
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
          - id: PRODUK
            uri: lb//PRODUK
            predicates:
              - path=api/produk/**
          - id: ORDER-SERVICE
            uri: lb://ORDER
            predicates:
              - path=api/order/**
eurekat:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

